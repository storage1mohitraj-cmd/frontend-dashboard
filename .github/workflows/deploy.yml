name: 🚀 Auto Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy Bot to Oracle VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 🚀 Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              ubuntu@${{ secrets.ORACLE_HOST }} << ENDSSH
          echo "================================================"
          echo "🤖 WOS Bot Auto-Deploy — \$(date)"
          echo "================================================"

          cd ~/bot

          # Pull latest code
          echo ""
          echo "📥 Pulling latest code..."
          git fetch origin
          OLD=\$(git rev-parse --short HEAD)
          git reset --hard origin/main
          NEW=\$(git rev-parse --short HEAD)
          echo "✅ Updated: \$OLD → \$NEW — \$(git log -1 --pretty=%s)"

          # Sync extra files if they exist (non-fatal)
          if [ -f "DISCORD BOT/cogs/bot_operations.py" ]; then
            cp "DISCORD BOT/cogs/bot_operations.py" cogs/bot_operations.py && echo "✅ Synced bot_operations.py"
          fi
          if [ -f "DISCORD BOT/db/mongo_adapters.py" ]; then
            cp "DISCORD BOT/db/mongo_adapters.py" db/mongo_adapters.py && echo "✅ Synced mongo_adapters.py"
          fi

          # Restart bot (always)
          echo ""
          echo "🔄 Restarting bot..."
          pm2 restart discordbot --update-env
          echo "✅ Bot restarted"

          echo ""
          pm2 status
          echo ""
          echo "================================================"
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "================================================"
          ENDSSH
