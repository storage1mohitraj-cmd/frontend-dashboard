name: 🚀 Auto Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy Bot to Oracle VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 🚀 Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ConnectTimeout=30 \
              ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} << 'ENDSSH'
          set -e
          echo "================================================"
          echo "🤖 WOS Bot Auto-Deploy — $(date)"
          echo "================================================"

          # Comprehensive directory search
          POSSIBLE_DIRS=(
            "$HOME/app/bot"
            "$HOME/bot"
            "$HOME/WOS-BOT-1"
            "$HOME/app/bot/DISCORD BOT"
            "$HOME/bot/DISCORD BOT"
          )
          
          BOT_DIR=""
          for dir in "${POSSIBLE_DIRS[@]}"; do
            if [ -d "$dir/.git" ]; then
              BOT_DIR="$dir"
              echo "✅ Found bot directory: $BOT_DIR"
              break
            fi
          done

          if [ -z "$BOT_DIR" ]; then
            echo "🔍 Searching with find (this may take a moment)..."
            BOT_DIR=$(find $HOME -name ".git" -type d -prune 2>/dev/null | head -n 1 | xargs -r dirname 2>/dev/null)
          fi

          if [ -z "$BOT_DIR" ]; then
            echo "❌ ERROR: Bot directory not found! Listing home directory contents:"
            ls -la $HOME
            exit 1
          fi
          
          cd "$BOT_DIR"
          echo "📂 Working directory: $(pwd)"

          # Pull latest code
          echo ""
          echo "📥 Pulling latest code..."
          
          # Fix for submodule-to-folder transitions
          # If these exist as directories but have .git files/folders inside, they will block git reset
          for item in "PROJECT_MIGRATION" "temp_frontend_repo" "temp_frontend_repo_2"; do
            if [ -d "$item" ] && [ -e "$item/.git" ]; then
              echo "🧹 Cleaning up legacy submodule artifacts in $item"
              rm -rf "$item/.git"
            fi
          done

          # Make sure we're on the right branch
          git checkout main || git checkout -b main
          git fetch origin main
          OLD=$(git rev-parse --short HEAD || echo "unknown")
          git reset --hard FETCH_HEAD
          NEW=$(git rev-parse --short HEAD || echo "unknown")
          echo "✅ Updated: $OLD → $NEW"

          # Update dependencies if requirements.txt changed
          if [ -f "requirements.txt" ]; then
            echo "📦 Checking dependencies..."
            # Try to find pip in venv
            if [ -f "venv/bin/pip" ]; then
              ./venv/bin/pip install --upgrade pip
              ./venv/bin/pip install -r requirements.txt
            elif [ -f "bot_venv/bin/pip" ]; then
              ./bot_venv/bin/pip install --upgrade pip
              ./bot_venv/bin/pip install -r requirements.txt
            else
              pip3 install --upgrade pip || true
              pip3 install -r requirements.txt || pip install -r requirements.txt
            fi
            echo "✅ Dependencies check complete"
          fi

          # Restart bot
          echo ""
          echo "🔄 Restarting bot..."
          
          # Check if PM2 is available, if not, try to find it
          PM2_CMD="pm2"
          if ! command -v pm2 &> /dev/null; then
            echo "⚠️ PM2 not found in PATH, searching..."
            # Common PM2 paths
            PM2_PATHS=(
              "$HOME/.local/bin/pm2"
              "$HOME/.npm-global/bin/pm2"
              "/usr/local/bin/pm2"
              "/usr/bin/pm2"
            )
            for path in "${PM2_PATHS[@]}"; do
              if [ -f "$path" ]; then
                PM2_CMD="$path"
                echo "✅ Found PM2 at $path"
                break
              fi
            done
          fi

          # Find PM2 process name
          PROCESS_NAME=$($PM2_CMD list | grep -oE "discordbot|bot" | head -n 1 || echo "discordbot")
          echo "🔄 Using process name: $PROCESS_NAME"
          
          # Force a restart of the specific process or start it
          cd "$BOT_DIR"
          if $PM2_CMD info "$PROCESS_NAME" > /dev/null 2>&1; then
            echo "✅ Process exists, restarting..."
            $PM2_CMD restart "$PROCESS_NAME" --update-env
          else
            echo "⚠️ Process not found, starting new..."
            $PM2_CMD start app.py --name "$PROCESS_NAME"
          fi
          
          echo "✅ Bot restarted"
          echo ""
          $PM2_CMD status
          echo ""
          echo "================================================"
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "================================================"
          ENDSSH
