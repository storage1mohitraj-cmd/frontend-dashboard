name: 🚀 Auto Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy Bot to Oracle VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 🚀 Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ConnectTimeout=30 \
              ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} << 'ENDSSH'
          echo "================================================"
          echo "🤖 WOS Bot Auto-Deploy — $(date)"
          echo "================================================"
          
          # Simplified directory discovery
          echo "🔍 Finding bot directory..."
          BOT_DIR=$(find $HOME -name "app.py" -type f -exec dirname {} \; | grep -vE "backup|temp|old|PROJECT_MIGRATION" | head -n 1)
          
          if [ -z "$BOT_DIR" ]; then
            echo "❌ Could not find app.py! Listing home directory..."
            ls -la $HOME
            BOT_DIR="$HOME/bot"
            [ -d "$HOME/app/bot" ] && BOT_DIR="$HOME/app/bot"
          fi
          
          echo "✅ Using BOT_DIR: $BOT_DIR"
          cd "$BOT_DIR" || exit 1
          echo "📂 Current directory: $(pwd)"
          
          # Pull latest code
          echo "📥 Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main
          
          # Restart bot
          echo "🔄 Restarting bot..."
          PM2_PATH=$(command -v pm2 || find $HOME -name "pm2" -type f -executable | head -n 1 || echo "pm2")
          echo "🚀 Using PM2: $PM2_PATH"
          
          $PM2_PATH restart discordbot --update-env || $PM2_PATH start app.py --name discordbot || echo "⚠️ Restart failed"
          
          echo "✅ DEPLOYMENT FINISHED"
          echo "================================================"
          ENDSSH
