name: 🚀 Auto Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy Bot to Oracle VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Check if requirements.txt changed
        id: req_check
        run: |
          if git diff HEAD~1 HEAD --name-only | grep -q "requirements.txt"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📦 requirements.txt changed — deps will be reinstalled"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ requirements.txt unchanged"
          fi

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 🚀 Deploy via SSH
        env:
          REQS_CHANGED: ${{ steps.req_check.outputs.changed }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              ubuntu@${{ secrets.ORACLE_HOST }} << 'ENDSSH'
          set -e
          echo "================================================"
          echo "🤖 WOS Bot Auto-Deploy — $(date)"
          echo "================================================"

          cd ~/bot

          # Pull latest code
          echo ""
          echo "📥 Pulling latest code..."
          git fetch origin
          git reset --hard origin/main
          echo "✅ Updated to: $(git rev-parse --short HEAD) — $(git log -1 --pretty=%s)"

          # Sync DISCORD BOT files to root (fix for duplicate directory structure)
          echo ""
          echo "🔄 Syncing bot files to active directories..."
          cp "DISCORD BOT/cogs/bot_operations.py" cogs/bot_operations.py
          cp "DISCORD BOT/db/mongo_adapters.py" db/mongo_adapters.py
          echo "✅ Files synced"

          # Install deps if requirements changed
          VENV="$HOME/bot/venv"
          if [ "$REQS_CHANGED" = "true" ] && [ -d "$VENV" ]; then
            echo ""
            echo "📦 Installing updated dependencies..."
            source "$VENV/bin/activate"
            pip install --disable-pip-version-check -r requirements.txt
            echo "✅ Dependencies updated"
          fi

          # Restart bot
          echo ""
          echo "🔄 Restarting bot..."
          pm2 restart discordbot --update-env
          echo "✅ Bot restarted"

          echo ""
          pm2 status
          echo ""
          echo "================================================"
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "================================================"
          ENDSSH
