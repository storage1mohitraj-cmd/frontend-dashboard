<!DOCTYPE html>
<html lang="en" data-theme="cyberpunk-cool">

<head>
  <script>
    let savedTheme = localStorage.getItem('theme') || 'cyberpunk-cool';
    if (savedTheme === 'viper') {
      savedTheme = 'cyberpunk-cool';
      localStorage.setItem('theme', 'cyberpunk-cool');
    }
    if (savedTheme !== 'dark') {
      document.documentElement.setAttribute('data-theme', savedTheme);
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Chat - Whiteout Survival</title>
  <meta name="description" content="Whiteout Survival global community chat with translation, GIFs, voice messages, replies, reactions, and reports.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>

<body class="chat-room-body">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true">
          <img src="assets/brand-logo.gif" alt="">
        </span>
        <span>Whiteout Survival</span>
      </a>

      <nav class="primary-nav nav-galaxy" aria-label="Primary navigation">
        <a href="features.html">Features</a>
        <a href="commands.html">Commands</a>
        <a class="active" href="chat.html">Chat</a>
        <a href="index.html#preview">Preview</a>
      </nav>

      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg class="contrast-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke-width="2"/></svg>
          <svg class="hacker-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m18 16 4-4-4-4M6 8l-4 4 4 4M14.5 4l-5 16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg class="cartoon-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke-width="2"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg class="aurora-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"><path d="M2 8c4-4 6 4 10 0s6-4 10 0M2 13c4-4 6 4 10 0s6-4 10 0M2 18c4-4 6 4 10 0s6-4 10 0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg class="cyberpunk-cool-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <a class="ghost-link dashboard-cta nav-galaxy" href="login.html" data-dashboard-link>Dashboard</a>
      </div>
    </div>
  </header>

  <main class="chat-room-page" data-chat-room>
    <section class="chat-room-shell">
      <aside class="chat-room-side">
        <div class="chat-room-brand">
          <span class="brand-mark" aria-hidden="true"><img src="assets/brand-logo.gif" alt=""></span>
          <div>
            <h1>Global Chat</h1>
            <p><b data-room-online>0</b> online</p>
          </div>
        </div>

        <div class="global-chat-login room-login" data-room-login>
          <input type="text" maxlength="32" placeholder="Custom player name" autocomplete="nickname" data-room-name>
          <button type="button" data-room-guest>Guest login</button>
          <a href="login.html" data-room-discord>Discord</a>
        </div>

        <div class="chat-room-user">
          <span data-room-identity>Guest access</span>
          <strong data-room-status>Loading room...</strong>
        </div>

        <div class="chat-session-panel" aria-label="Chat sessions">
          <div class="chat-panel-heading">
            <span>Channels</span>
            <b data-room-session-count>1</b>
          </div>
          <button class="chat-session-item active" type="button" data-room-global-session>
            <span class="chat-session-icon">#</span>
            <span>
              <strong>Community Room</strong>
              <small>Public WOS chat</small>
            </span>
          </button>
          <div class="chat-session-list" data-room-session-list></div>
        </div>
      </aside>

      <section class="chat-room-main">
        <div class="chat-room-topbar">
          <div class="chat-active-room">
            <span class="chat-active-avatar" data-room-active-avatar>#</span>
            <div>
              <strong data-room-title>Community Room</strong>
              <span data-room-subtitle>UTC and local time are shown on every message</span>
            </div>
          </div>
          <button class="chat-room-refresh chat-whisper-clear" type="button" data-room-whisper-clear hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
            Public room
          </button>
          <button class="chat-room-refresh" type="button" data-room-refresh>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
              <path d="M3 21v-5h5"></path>
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
              <path d="M16 8h5V3"></path>
            </svg>
            Refresh
          </button>
        </div>

        <div class="chat-loading" data-room-loading>
          <span></span><span></span><span></span>
        </div>

        <div class="chat-room-messages" data-room-messages></div>

        <div class="room-reply-bar" data-room-reply hidden>
          <div>
            <span>Replying to</span>
            <strong data-room-reply-name></strong>
            <p data-room-reply-content></p>
          </div>
          <button type="button" data-room-reply-clear aria-label="Clear reply" title="Clear reply">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>

        <div class="chat-attachments room-attachments" data-room-attachments hidden></div>

        <form class="global-chat-form room-composer" data-room-form>
          <div class="chat-input-wrap">
            <textarea rows="1" maxlength="1500" placeholder="Message global chat" data-room-input></textarea>
            <div class="chat-emoji-panel" data-room-emoji-panel hidden></div>
            <div class="tenor-panel" data-room-tenor-panel hidden>
              <div class="tenor-search">
                <input type="search" placeholder="Search Tenor GIFs" data-room-tenor-search>
                <button type="button" data-room-tenor-go>Search</button>
              </div>
              <div class="tenor-results" data-room-tenor-results></div>
            </div>
          </div>
          <div class="chat-form-actions">
            <button class="chat-icon-button" type="button" aria-label="Add emoji" title="Emoji" data-room-emoji>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                <path d="M9 9h.01"></path>
                <path d="M15 9h.01"></path>
              </svg>
            </button>
            <button class="chat-icon-button" type="button" aria-label="Search GIFs" title="GIFs" data-room-tenor>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="M8 9h3"></path>
                <path d="M8 15V9"></path>
                <path d="M13 9v6"></path>
                <path d="M16 9h3"></path>
                <path d="M16 12h2"></path>
                <path d="M16 15h3"></path>
              </svg>
            </button>
            <button class="chat-icon-button" type="button" aria-label="Record voice" title="Voice" data-room-voice>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <path d="M12 19v3"></path>
              </svg>
            </button>
            <label class="chat-icon-button" aria-label="Attach file" title="Attach file">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 1 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
              </svg>
              <input type="file" multiple data-room-file>
            </label>
            <button class="chat-send-button" type="submit" aria-label="Send message" title="Send">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m22 2-7 20-4-9-9-4Z"></path>
                <path d="M22 2 11 13"></path>
              </svg>
            </button>
          </div>
        </form>
      </section>

      <aside class="chat-member-panel">
        <div class="chat-panel-heading">
          <span>Members</span>
          <b data-room-member-count>0 online</b>
        </div>
        <label class="chat-member-search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input type="search" placeholder="Search players" data-room-member-search>
        </label>
        <div class="chat-member-list" data-room-member-list></div>

        <div class="chat-profile-card" data-room-profile hidden>
          <button class="chat-profile-close" type="button" data-room-profile-close aria-label="Close profile">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
          <div class="chat-profile-avatar" data-room-profile-avatar></div>
          <strong data-room-profile-name>Player</strong>
          <span data-room-profile-kind>Guest Account</span>
          <div class="chat-profile-actions">
            <button type="button" data-room-profile-whisper>Whisper</button>
            <button type="button" data-room-profile-copy>Copy ID</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="assets/site-data.js"></script>
  <script src="assets/site.js"></script>
  <script src="assets/chat-room.js"></script>
</body>

</html>
