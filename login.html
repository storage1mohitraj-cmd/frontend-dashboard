<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'cartoon';
    if (savedTheme && savedTheme !== 'dark') {
      document.documentElement.setAttribute('data-theme', savedTheme);
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Whiteout Survival Dashboard</title>
  <!-- Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #5865F2;
      --primary-hover: #4752C4;
      --bg-dark: #07080d;
      --glass-bg: rgba(16, 17, 26, 0.68);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 12% 14%, rgba(88, 101, 242, 0.24), transparent 28rem),
        radial-gradient(circle at 88% 4%, rgba(59, 130, 246, 0.17), transparent 24rem),
        var(--bg-dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    .bg-animation {
      position: absolute;
      inset: -10%;
      background: url('hero-bg.png') no-repeat center center/cover;
      opacity: 0.26;
      z-index: -1;
      filter: blur(7px) brightness(0.58);
      animation: slowPan 24s infinite alternate ease-in-out;
    }

    .bg-animation::before,
    .bg-animation::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(22px);
      opacity: 0.44;
    }

    .bg-animation::before {
      width: 18rem;
      height: 18rem;
      left: 8%;
      top: 12%;
      background: rgba(88, 101, 242, 0.34);
      animation: pulseOrb 10s infinite ease-in-out;
    }

    .bg-animation::after {
      width: 14rem;
      height: 14rem;
      right: 10%;
      bottom: 8%;
      background: rgba(56, 189, 248, 0.32);
      animation: pulseOrb 11s infinite ease-in-out reverse;
    }

    @keyframes slowPan {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-20px, -20px) scale(1.05); }
    }

    .login-container {
      background: linear-gradient(160deg, rgba(22, 24, 36, 0.84), var(--glass-bg));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 52px 40px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes floatUp {
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulseOrb {
      0%, 100% { transform: scale(1); opacity: 0.42; }
      50% { transform: scale(1.08); opacity: 0.62; }
    }

    .bot-avatar {
      width: 124px;
      height: 124px;
      border-radius: 50%;
      margin: 0 auto 30px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
      object-fit: cover;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5em;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #a6a8b7;
      font-size: 1.04rem;
      margin-bottom: 34px;
      font-weight: 400;
      line-height: 1.5;
    }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 1.2em;
      font-weight: 600;
      transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
      box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3);
      width: 100%;
    }

    .discord-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 12px 25px rgba(88, 101, 242, 0.4);
    }

    .discord-icon {
      width: 28px;
      height: 28px;
    }

    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.95em;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #fff;
    }

    @media (max-width: 768px) {
      body {
        align-items: flex-start;
        padding-top: 32px;
        padding-bottom: 32px;
      }

      .login-container {
        padding: 40px 26px;
        border-radius: 20px;
      }

      h1 {
        font-size: 2.1em;
      }

      .subtitle {
        font-size: 1rem;
      }

      .discord-btn {
        font-size: 1.08em;
        padding: 15px 20px;
      }
    }

    @media (max-width: 420px) {
      .login-container {
        padding: 32px 18px;
      }

      .bot-avatar {
        width: 104px;
        height: 104px;
        margin-bottom: 22px;
      }

      h1 {
        font-size: 1.8em;
      }

      .back-link {
        margin-top: 22px;
      }
    }

    /* ── Aurora Theme Style Overrides ── */
    [data-theme="aurora"] {
      --radius: 12px;
      --bg-dark: #020c1b;
      --glass-bg: rgba(4, 19, 43, 0.35);
      --glass-border: rgba(0, 229, 255, 0.15);
      --primary: #00e5ff;
      --primary-hover: #00b8cc;
    }

    [data-theme="aurora"] body {
      background-color: #020c1b !important;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.18) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 230, 118, 0.12) 0%, transparent 50%) !important;
      color: #e0f2fe !important;
    }

    [data-theme="aurora"] h1 {
      background: linear-gradient(to right, #00e5ff, #00e676) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
    }

    [data-theme="aurora"] .subtitle {
      color: #38bdf8 !important;
    }

    [data-theme="aurora"] .discord-btn {
      color: #020c1b !important;
      box-shadow: 0 8px 20px rgba(0, 229, 255, 0.3) !important;
    }

    [data-theme="aurora"] .discord-btn:hover {
      box-shadow: 0 12px 25px rgba(0, 229, 255, 0.4) !important;
    }

    [data-theme="aurora"] .back-link {
      color: rgba(0, 229, 255, 0.6) !important;
      background: none !important;
      -webkit-text-fill-color: initial !important;
    }

    [data-theme="aurora"] .back-link:hover {
      color: #00e5ff !important;
    }

    [data-theme="aurora"] .bg-animation {
      opacity: 0.08 !important;
    }

    /* ── Cartoon Theme Style Overrides ── */
    [data-theme="cartoon"] {
      --radius: 8px;
      --bg-dark: #FAF8F2;
      --glass-bg: #ffffff;
      --glass-border: #191919;
      --primary: #5865F2;
      --primary-hover: #4752C4;
    }

    [data-theme="cartoon"] body {
      background-color: #FAF8F2 !important;
      background-image: 
        radial-gradient(circle at 80% 20%, rgba(253, 223, 60, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(247, 92, 130, 0.1) 0%, transparent 40%) !important;
      font-family: "Lora", Georgia, serif !important;
      color: #191919 !important;
    }

    [data-theme="cartoon"] h1,
    [data-theme="cartoon"] .back-link {
      font-family: 'Newsreader', 'Lora', Georgia, serif !important;
      font-weight: 800 !important;
      color: #191919 !important;
      background: none !important;
      -webkit-text-fill-color: initial !important;
      text-shadow: none !important;
    }

    [data-theme="cartoon"] .subtitle {
      color: #3d3d3d !important;
      font-weight: 500 !important;
    }

    [data-theme="cartoon"] .login-container {
      background: #ffffff !important;
      border: 2px solid #191919 !important;
      box-shadow: 6px 6px 0px #191919 !important;
      border-radius: 8px !important;
      color: #191919 !important;
      backdrop-filter: none !important;
    }

    [data-theme="cartoon"] .bot-avatar {
      border: 3px solid #191919 !important;
      box-shadow: 4px 4px 0px #191919 !important;
    }

    [data-theme="cartoon"] .discord-btn {
      background: #5865F2 !important;
      color: #ffffff !important;
      border: 2px solid #191919 !important;
      box-shadow: 3px 3px 0px #191919 !important;
      border-radius: 8px !important;
      transition: transform 0.15s ease, box-shadow 0.15s ease !important;
    }

    [data-theme="cartoon"] .discord-btn:hover {
      background: #4752C4 !important;
      transform: translate(-2px, -2px) !important;
      box-shadow: 5px 5px 0px #191919 !important;
    }

    [data-theme="cartoon"] .discord-btn:active {
      transform: translate(0px, 0px) !important;
      box-shadow: 1px 1px 0px #191919 !important;
    }

    [data-theme="cartoon"] .back-link {
      color: #5a5a5a !important;
      font-weight: bold !important;
    }

    [data-theme="cartoon"] .back-link:hover {
      color: #191919 !important;
      text-decoration: underline !important;
    }

    [data-theme="cartoon"] .bg-animation {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="bg-animation"></div>
  <div class="login-container">
    <img src="logo.gif"
      alt="Bot Avatar" class="bot-avatar">

    <h1>Whiteout Survival</h1>
    <p class="subtitle">Securely login with Discord to access the dashboard</p>

    <a href="#" id="discord-login-btn" class="discord-btn">
      <svg class="discord-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09c-.01-.02-.04-.03-.07-.03c-1.5.26-2.93.71-4.27 1.33c-.01 0-.02.01-.03.02c-2.72 4.07-3.47 8.03-3.1 11.95c0 .02.01.04.03.05c1.8 1.32 3.53 2.12 5.24 2.65c.03.01.06 0 .07-.02c.4-.55.76-1.13 1.07-1.74c.02-.04 0-.08-.04-.09c-.57-.22-1.11-.48-1.64-.78c-.04-.02-.04-.08-.01-.11c.11-.08.22-.17.33-.25c.02-.02.05-.02.07-.01c3.44 1.57 7.15 1.57 10.55 0c.02-.01.05-.01.07.01c.11.09.22.17.33.26c.04.03.04.09-.01.11c-.52.31-1.07.56-1.64.78c-.04.01-.05.06-.04.09c.32.61.68 1.19 1.07 1.74c.03.01.06.02.09.01c1.72-.53 3.45-1.33 5.25-2.65c.02-.01.03-.03.03-.05c.44-4.53-.73-8.46-3.1-11.95c-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.83 2.12-1.89 2.12z" />
      </svg>
      Login with Discord
    </a>

    <a href="index.html" class="back-link">← Return Home</a>
  </div>

  <script>
    if (localStorage.getItem('discord_access_token')) {
      window.location.href = 'dashboard.html';
    }

    const DISCORD_CLIENT_ID = '1399025185046134866';
    
    // Dynamically calculate the redirect URI based on wherever the site is hosted!
    const REDIRECT_URI = window.location.origin + '/oauth-callback.html';

    function buildDiscordAuthUrl() {
      const base = 'https://discord.com/api/oauth2/authorize';
      const scope = encodeURIComponent('identify guilds');
      return `${base}?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=${scope}&prompt=consent`;
    }

    document.getElementById('discord-login-btn').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = buildDiscordAuthUrl();
    });
  </script>
</body>

</html>
